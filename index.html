<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Juego Romántico 💖</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- AUDIO -->
<audio id="spinSound" src="spin.mp3"></audio>
<audio id="winSound" src="win.mp3"></audio>

<!-- INICIO -->
<div id="inicio" class="screen active">
  <div class="title">💖 Te Amo</div>
  <div class="card">
    <input id="name" placeholder="Nombre del jugador">
    <button class="btn" id="btnAgregar">Agregar</button>
    <ul id="list"></ul>
    <button class="btn" id="btnComenzar">Comenzar</button>
  </div>
</div>

<!-- JUEGO -->
<div id="game" class="screen">
  <h3 id="turno"></h3>
  <div style="position:relative">
    <svg id="wheel" viewBox="0 0 300 300"></svg>
  </div>
  <button class="btn" id="btnGirar">💖 GIRAR</button>
  <button class="btn2" id="btnFinalizar">Finalizar</button>
</div>

<!-- MODAL DE RETO -->
<div id="modal" class="hidden">
  <div class="modal-box">
    <h2 id="rt"></h2>
    <p id="rd"></p>
    <p id="rp"></p>
    <button class="btn" id="btnCumplio">Cumplió</button>
    <button class="btn2" id="btnNoCumplio">No cumplió</button>
  </div>
</div>

<!-- FINAL -->
<div id="final" class="screen">
  <div class="title" id="ganador"></div>
  <table id="rank"></table>
  <button class="btn" onclick="location.reload()">Reiniciar</button>
</div>

<script src="retos.js"></script>
<script src="script.js"></script>
</body>
</html>
